# Publish to GitHub Packages
#
# Reusable workflow invoked by "Release" after a v* tag has been pushed.
# Publishes codegen-annotations, codegen-runtime, and codegen-processor
# at the supplied version using the committed Gradle wrapper.

name: Publish

on:
  workflow_call:
    inputs:
      version:
        description: 'Version to publish (no v prefix, e.g. 0.1.0)'
        required: true
        type: string

permissions:
  packages: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin

      - name: Publish ${{ inputs.version }} to GitHub Packages
        run: ./gradlew publishAllPublicationsToGitHubPackagesRepository -Pversion=${{ inputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
