# Publish to GitHub Packages
#
# Triggered automatically when a v* tag is pushed (typically by the
# "Release" workflow). Publishes codegen-annotations, codegen-runtime,
# and codegen-processor at the tagged version.

name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  packages: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin

      - name: Resolve version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish ${{ steps.version.outputs.version }} to GitHub Packages
        run: ./gradlew publishAllPublicationsToGitHubPackagesRepository -Pversion=${{ steps.version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
