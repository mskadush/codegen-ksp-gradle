# Publish to GitHub Packages
#
# To release a new version:
#   1. Open the Actions tab on GitHub
#   2. Select the "Publish" workflow
#   3. Click "Run workflow"
#   4. Enter the version (without the 'v' prefix, e.g. 0.1.0)
#   5. Click "Run workflow"
#
# The workflow will create and push the git tag (v<version>), then publish
# codegen-annotations, codegen-runtime, and codegen-processor to GitHub Packages.

name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (no v prefix, e.g. 0.1.0)'
        required: true

permissions:
  packages: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag v${{ inputs.version }}
          git push origin v${{ inputs.version }}

      - name: Publish to GitHub Packages
        run: ./gradlew publishAllPublicationsToGitHubPackagesRepository -Pversion=${{ inputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
