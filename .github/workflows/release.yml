# Release: bump version, push a new tag, then publish.
#
# To release:
#   1. Open the Actions tab on GitHub
#   2. Select the "Release" workflow
#   3. Click "Run workflow"
#   4. Choose the bump type (patch, minor, major)
#   5. Click "Run workflow"
#
# This computes the next version from the latest v* tag, creates and
# pushes the new tag, then invokes the reusable "Publish" workflow.

name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  packages: write

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          latest=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            major=0; minor=0; patch=0
          else
            v=${latest#v}
            IFS=. read -r major minor patch <<<"$v"
          fi
          case "${{ inputs.bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          next="${major}.${minor}.${patch}"
          echo "version=${next}" >> "$GITHUB_OUTPUT"
          echo "Bumping ${latest:-<none>} -> v${next}"

      - name: Create and push tag v${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

  publish:
    needs: tag
    uses: ./.github/workflows/publish.yml
    with:
      version: ${{ needs.tag.outputs.version }}
    secrets: inherit
